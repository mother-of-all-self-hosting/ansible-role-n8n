---
# Project source code URL: https://github.com/n8n-io/n8n

n8n_enabled: true

n8n_identifier: n8n
n8n_base_path: "/{{ n8n_identifier }}"
n8n_data_path: "{{ n8n_base_path }}/data"
n8n_config_path: "{{ n8n_data_path }}/.n8n"

# renovate: datasource=docker depName=docker.n8n.io/n8nio/n8n
n8n_version: 2.18.4

# The n8n container image uses UID and GID 1000 for the user node internally.
n8n_uid: "1000"
n8n_gid: "1000"

# The scheme used for serving n8n.
n8n_scheme: https

# The hostname at which n8n is served.
n8n_hostname: ""

# The path at which n8n is served.
# This value must either be `/` or not end with a slash (e.g. `/n8n`).
#
# Hosting n8n under a subpath does not seem to be possible due to n8n's
# technical limitations.
n8n_path_prefix: /

n8n_container_image: "{{ n8n_container_image_registry_prefix }}n8nio/n8n:{{ n8n_container_image_tag }}"
n8n_container_image_tag: "{{ n8n_version }}"
n8n_container_image_registry_prefix: "{{ n8n_container_image_registry_prefix_upstream }}"
n8n_container_image_registry_prefix_upstream: "{{ n8n_container_image_registry_prefix_upstream_default }}"
n8n_container_image_registry_prefix_upstream_default: docker.n8n.io/
n8n_container_image_force_pull: "{{ n8n_container_image.endswith(':latest') }}"
# TODO: add tasks to self-build the image

# The base container network. It will be auto-created by this role if it doesn't exist already.
n8n_container_network: "{{ n8n_identifier }}"

# Control if the container network is deleted on uninstalling.
n8n_container_network_deletion_enabled: true

# Specify how the container publishes its HTTP port (as defined by `n8n_container_http_port`).
#
# Takes an "<ip>:<port>" or "<port>" value (e.g. "127.0.0.1:2586"), or empty string to not expose.
n8n_container_http_host_bind_port: ""

# The port number in the container
n8n_container_http_port: 5678

# A list of additional container networks that the container would be connected to.
# The role does not create these networks, so make sure they already exist.
# Use this to expose this container to another reverse proxy, which runs in a different container network.
n8n_container_additional_networks: "{{ n8n_container_additional_networks_auto + n8n_container_additional_networks_custom }}"
n8n_container_additional_networks_auto: []
n8n_container_additional_networks_custom: []

# A list of additional "volumes" to mount in the container.
# This list gets populated dynamically at runtime. You can provide a different default value,
# if you wish to mount your own files into the container.
# Contains definition objects like this: `{"type": "bind", "src": "/outside", "dst": "/inside", "options": "readonly"}.
# See the `--mount` documentation for the `docker run` command.
n8n_container_additional_volumes: "{{ n8n_container_additional_volumes_auto + n8n_container_additional_volumes_custom }}"
n8n_container_additional_volumes_auto: []
n8n_container_additional_volumes_custom: []

# n8n_container_labels_traefik_enabled controls whether labels to assist a Traefik reverse-proxy will be attached to the container.
# See `../templates/labels.j2` for details.
#
# To inject your own other container labels, see `n8n_container_labels_additional_labels_custom`.
n8n_container_labels_traefik_enabled: true
n8n_container_labels_traefik_docker_network: "{{ n8n_container_network }}"
n8n_container_labels_traefik_hostname: "{{ n8n_hostname }}"
# The path prefix must either be `/` or not end with a slash (e.g. `/n8n`).
n8n_container_labels_traefik_path_prefix: "{{ n8n_path_prefix }}"
n8n_container_labels_traefik_rule: "Host(`{{ n8n_container_labels_traefik_hostname }}`){% if n8n_container_labels_traefik_path_prefix != '/' %} && PathPrefix(`{{ n8n_container_labels_traefik_path_prefix }}`){% endif %}"
n8n_container_labels_traefik_priority: 0
n8n_container_labels_traefik_entrypoints: web-secure
n8n_container_labels_traefik_tls: "{{ n8n_container_labels_traefik_entrypoints != 'web' }}"
n8n_container_labels_traefik_tls_certResolver: default  # noqa var-naming

# Controls which additional headers to attach to all HTTP requests.
# To add your own custom request headers, use `n8n_container_labels_traefik_additional_request_headers_custom`
n8n_container_labels_traefik_additional_request_headers: "{{ n8n_container_labels_traefik_additional_request_headers_auto | combine(n8n_container_labels_traefik_additional_request_headers_custom) }}"
n8n_container_labels_traefik_additional_request_headers_auto: {}
n8n_container_labels_traefik_additional_request_headers_custom: {}

# Controls which additional headers to attach to all HTTP responses.
# To add your own custom response headers, use `n8n_container_labels_traefik_additional_response_headers_custom`
n8n_container_labels_traefik_additional_response_headers: "{{ n8n_container_labels_traefik_additional_response_headers_auto | combine(n8n_container_labels_traefik_additional_response_headers_custom) }}"
n8n_container_labels_traefik_additional_response_headers_auto: |
  {{
    {}
    | combine ({'X-XSS-Protection': n8n_http_header_xss_protection} if n8n_http_header_xss_protection else {})
    | combine ({'X-Content-Type-Options': n8n_http_header_content_type_options} if n8n_http_header_content_type_options else {})
    | combine ({'Content-Security-Policy': n8n_http_header_content_security_policy} if n8n_http_header_content_security_policy else {})
    | combine ({'Permissions-Policy': n8n_http_header_permissions_policy} if n8n_http_header_permissions_policy else {})
    | combine ({'Strict-Transport-Security': n8n_http_header_strict_transport_security} if n8n_http_header_strict_transport_security and n8n_container_labels_traefik_tls else {})
  }}
n8n_container_labels_traefik_additional_response_headers_custom: {}

# n8n_container_labels_additional_labels contains a multiline string with additional labels to add to the container label file.
# See `../templates/labels.j2` for details.
# To add your own custom labels, use `n8n_container_labels_additional_labels_custom`
#
# Example:
# n8n_container_labels_additional_labels_custom:
#   - my.label=1
#   - another.label="here"
n8n_container_labels_additional_labels: "{{ n8n_container_labels_additional_labels_auto + n8n_container_labels_additional_labels_custom }}"
n8n_container_labels_additional_labels_auto: []
n8n_container_labels_additional_labels_custom: []

# Specify the size of the container's tmpfs volume
n8n_container_tmpfs_tmp_size: 128m

# A list of extra arguments to pass to the container (`docker create` command)
n8n_container_extra_arguments: "{{ n8n_container_extra_arguments_auto + n8n_container_extra_arguments_custom }}"
n8n_container_extra_arguments_auto: []
n8n_container_extra_arguments_custom: []

# Specifies the value of the `X-XSS-Protection` header
# Stops pages from loading when they detect reflected cross-site scripting (XSS) attacks.
#
# Learn more about it is here:
# - https://developer.mozilla.org/en-US/docs/Web/HTTP/Headers/X-XSS-Protection
# - https://portswigger.net/web-security/cross-site-scripting/reflected
n8n_http_header_xss_protection: "1; mode=block"

# Specifies the value of the `X-Content-Type-Options` header.
# See: https://developer.mozilla.org/en-US/docs/Web/HTTP/Headers/X-Content-Type-Options
n8n_http_header_content_type_options: nosniff

# Specifies the value of the `Content-Security-Policy` header.
# See: https://developer.mozilla.org/en-US/docs/Web/HTTP/Headers/Content-Security-Policy
n8n_http_header_content_security_policy: frame-ancestors 'self'

# Specifies the value of the `Permissions-Policy` header.
# See: https://developer.mozilla.org/en-US/docs/Web/HTTP/Headers/Permissions-Policy
n8n_http_header_permissions_policy: "{{ 'interest-cohort=()' if n8n_floc_optout_enabled else '' }}"

# Specifies the value of the `Strict-Transport-Security` header.
# See: https://developer.mozilla.org/en-US/docs/Web/HTTP/Headers/Strict-Transport-Security
n8n_http_header_strict_transport_security: "max-age=31536000; includeSubDomains{{ '; preload' if n8n_hsts_preload_enabled else '' }}"

# Controls whether to send a "Permissions-Policy interest-cohort=();" header along with all responses
#
# Learn more about what it is here:
# - https://www.eff.org/deeplinks/2021/03/googles-floc-terrible-idea
# - https://paramdeo.com/blog/opting-your-website-out-of-googles-floc-network
# - https://amifloced.org/
#
# Of course, a better solution is to just stop using browsers (like Chrome), which participate in such tracking practices.
# See: `n8n_http_header_permissions_policy`
n8n_floc_optout_enabled: true

# Controls if HSTS preloading is enabled
#
# In its strongest and recommended form, the [HSTS policy](https://www.chromium.org/hsts) includes all subdomains, and
# indicates a willingness to be "preloaded" into browsers:
# `Strict-Transport-Security: max-age=31536000; includeSubDomains; preload`
# For more information visit:
# - https://en.wikipedia.org/wiki/HTTP_Strict_Transport_Security
# - https://developer.mozilla.org/en-US/docs/Web/HTTP/Headers/Strict-Transport-Security
# - https://hstspreload.org/#opt-in
# See: `n8n_http_header_strict_transport_security`
n8n_hsts_preload_enabled: false

# List of systemd services that the n8n systemd service depends on
n8n_systemd_required_services_list: "{{ n8n_systemd_required_services_list_default + n8n_systemd_required_services_list_auto + n8n_systemd_required_services_list_custom }}"
n8n_systemd_required_services_list_default: "{{ [devture_systemd_docker_base_docker_service_name] if devture_systemd_docker_base_docker_service_name else [] }}"
n8n_systemd_required_services_list_auto: []
n8n_systemd_required_services_list_custom: []

# List of systemd services that the n8n systemd service wants
n8n_systemd_wanted_services_list: "{{ n8n_systemd_wanted_services_list_default + n8n_systemd_wanted_services_list_auto + n8n_systemd_wanted_services_list_custom }}"
n8n_systemd_wanted_services_list_default: []
n8n_systemd_wanted_services_list_auto: []
n8n_systemd_wanted_services_list_custom: []

# Controls how long to wait for the container to stop gracefully before killing it.
n8n_container_stop_grace_time_seconds: "{{ devture_systemd_docker_base_container_stop_grace_time_seconds }}"

# Controls how long the pre-start cleanup should wait for stale container-name release
# before failing startup explicitly.
n8n_container_cleanup_timeout_seconds: "{{ devture_systemd_docker_base_container_cleanup_timeout_seconds }}"

# Controls the delay between pre-start cleanup retries.
n8n_container_cleanup_retry_delay_seconds: "{{ devture_systemd_docker_base_container_cleanup_retry_delay_seconds }}"

# Shell command used in the systemd pre-start phase to deterministically remove a stale
# container and wait until Docker releases its name.
n8n_container_cleanup_command: |
  i=0;
  while [ "$i" -lt {{ n8n_container_cleanup_timeout_seconds }} ]; do
  {{ devture_systemd_docker_base_host_command_docker }} stop -t {{ n8n_container_stop_grace_time_seconds }} {{ n8n_identifier }} >/dev/null 2>&1 || true;
  {{ devture_systemd_docker_base_host_command_docker }} rm -f {{ n8n_identifier }} >/dev/null 2>&1 || true;
  if {{ devture_systemd_docker_base_host_command_docker }} container inspect {{ n8n_identifier }} >/dev/null 2>&1; then
  i=$((i + 1));
  sleep {{ n8n_container_cleanup_retry_delay_seconds }};
  continue;
  fi;
  if {{ devture_systemd_docker_base_host_command_docker }} info >/dev/null 2>&1; then
  exit 0;
  fi;
  echo "Failed to query Docker daemon while cleaning up {{ n8n_identifier }}" >&2;
  exit 1;
  done;
  echo "Failed to remove stale container {{ n8n_identifier }} after {{ n8n_container_cleanup_timeout_seconds }} attempts" >&2;
  exit 1

########################################################################
#                                                                      #
# database                                                             #
#                                                                      #
########################################################################

# Specify database configuration
n8n_database_hostname: ""
n8n_database_port: 5432
n8n_database_username: n8n
n8n_database_password: ""
n8n_database_name: n8n

# Control if the connection to Postgres is made via a Unix socket
n8n_database_socket_enabled: true

# Specify the path to the Postgres Unix socket path on the host (bind-mount source)
n8n_database_socket_path_host: ""

# Specify the path to the Postgres Unix socket path inside the n8n container
n8n_database_socket_path_container: /run-postgres

n8n_environment_variables_db_postgresdb_host: "{{ n8n_database_socket_path_container if n8n_database_socket_enabled else n8n_database_hostname }}"

########################################################################
#                                                                      #
# /database                                                            #
#                                                                      #
########################################################################

# Control if isolation mode is enabled
n8n_isolation_enabled: true

# Specify the timezone
n8n_environment_variables_tz: UTC

n8n_environment_variables_n8n_metrics: false

# Additional environment variables.
n8n_environment_variables_additional_variables: ""

# n8n_restart_necessary controls whether the n8n systemd
# service will be restarted (when true) or merely started (when false) by the
# systemd service manager role (when conditional restart is enabled).
#
# This value is automatically computed during installation based on whether
# any configuration files, the systemd service file, or the container image changed.
# The default of `false` means "no restart needed" — appropriate when the role's
# installation tasks haven't run (e.g., due to --tags skipping them).
n8n_restart_necessary: false
