---
- name: Perform Fider installation tasks
  when: fider_enabled | bool
  tags:
    - setup-all
    - setup-fider
    - install-all
    - install-fider
  block:
    - name: Validate Fider configuration
      ansible.builtin.include_tasks: "{{ role_path }}/tasks/validate_config.yml"
    - name: Install Fider
      ansible.builtin.include_tasks: "{{ role_path }}/tasks/install.yml"

- name: Perform Fider uninstallation tasks
  when: not fider_enabled | bool
  tags:
    - setup-all
    - setup-fider
  block:
    - name: Uninstall Fider
      ansible.builtin.include_tasks: "{{ role_path }}/tasks/uninstall.yml"
